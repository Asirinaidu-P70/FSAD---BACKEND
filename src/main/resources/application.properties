spring.application.name=workshop-backend

server.port=${PORT:8081}

# Profile-based configuration
# Use: spring.profiles.active=h2 (for Render deployment)
# Use: spring.profiles.active=mysql (for local MySQL)
# Default: H2 (file-based, no setup needed)

# MySQL Database (Local Development with MySQL Workbench)
spring.datasource.url=jdbc:mysql://localhost:3306/workshopdb?createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=NewPassword123

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# General Configuration
spring.jackson.time-zone=Asia/Kolkata
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true